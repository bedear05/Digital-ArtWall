<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>내 버킷리스트 카드</title>
    <style>
        /* 기본 카드 디자인 (자유롭게 수정 가능) */
        .card {
            width: 300px;
            margin: 50px auto;
            background: linear-gradient(135deg, #fffcf0 0%, #fff3b0 100%);
            padding: 15px 15px 35px 15px;
            border-radius: 2px 2px 15px 5px;
            box-shadow: 3px 5px 15px rgba(0, 0, 0, 0.15);
            /* 배지의 기준점이 되기 위한 필수 속성 */
            position: relative;
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        .card h2 {
            color: #2c3e50;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .card p {
            color: #444;
            font-size: 1.1rem;
            line-height: 1.5;
        }

        .card {
            position: relative
        }

        body {
            background-image: url("wood.png");
            background-repeat: round;
        }

        .badge {
            position: absolute;
            top: -10px;
            right: -20px;
            background: red;
            color: white;
            padding: 12px 12px;
            border-radius: 150%;
            font-weight: 800;
        }

        .TMI {
            visibility: hidden;
        }

        .card:hover .TMI {
            visibility: visible;
            font-weight: 800;
        }

        /* 1. 배지 (absolute) 관련 CSS를 작성하세요 */
        /* 2. 비밀 메모 (visibility) 및 hover 효과 관련 CSS를 작성하세요 */
    </style>
</head>

<body>
    <div class="card">
        <div class="badge">
            pin
        </div>
        <img src="coffe and note.jpg" alt="버킷리스트 작성 중">
        <h2>✨ 안진혁의 꿈</h2>
        <p>🚗 1. 운전면허 따기</p>
        <p>👔 2. 알바 붙기</p>
        <div class="TMI">
            <p>TMI: 아직 알바 지원 2번해봄</p>
        </div>
    </div>
</body>
